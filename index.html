<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewAge - Redirecionando ao Sorteio</title>
    <style>
        body {
            background-color: #0c0707;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            padding: 30px;
            background: rgba(255, 30, 49, 0.05);
            border: 1px solid #ff1e31;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(255, 30, 49, 0.2);
        }
        h1 {
            color: #ff1e31;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            font-size: 16px;
            color: #ccc;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #ff1e31;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: background 0.3s, transform 0.2s;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #d11222;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Clã NewAge</h1>
        <p>Estamos redirecionando você para o sorteio no aplicativo...</p>
        <p>Se o aplicativo não abrir automaticamente em alguns segundos, clique no botão abaixo:</p>
        <a id="app-link" class="btn" href="newage://raffle">Abrir no Aplicativo NewAge 🎁</a>
    </div>

    <script>
        // Captura o ID do sorteio a partir dos parâmetros da URL (?id=XXX)
        const urlParams = new URLSearchParams(window.location.search);
        const raffleId = urlParams.get('id');
        
        if (raffleId) {
            const deepLink = 'newage://raffle?id=' + raffleId;
            document.getElementById('app-link').href = deepLink;
            
            // Tenta redirecionar automaticamente assim que a página carrega
            window.location.href = deepLink;
        }
    </script>
</body>
</html>
